    gegenkonto: "1748"
    kuerzel: "Nürnberg. LV {MM.YYYY}"
    beleg1: ""

  - pattern: 'Telekom.*Mobilfunk|Mobilfunk Kundenkonto'
    gegenkonto: "6815"
    kuerzel: "Telekom Mobil"

  - pattern: 'Telekom Deutschland'
    gegenkonto: "6815"
    kuerzel: "Telekom"

  - pattern: 'Klarna'
    gegenkonto: "1400"
